<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venda de Ingressos</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">
        <div class="card shadow p-4">
            
            <h2 class="text-center mb-4">
                Venda de Ingressos
                <span class="badge bg-success">Promoção</span>
            </h2>

            <!-- Accordion -->
            <div class="accordion mb-4" id="accordionInfo">

                <div class="accordion-item">
                    <h2 class="accordion-header">
                        <button class="accordion-button" type="button" 
                                data-bs-toggle="collapse" 
                                data-bs-target="#collapseOne">
                            Informações do Evento
                        </button>
                    </h2>

                    <div id="collapseOne" 
                         class="accordion-collapse collapse show"
                         data-bs-parent="#accordionInfo">

                        <div class="accordion-body">
                            Evento musical ao vivo com áreas VIP, meia entrada e inteira.
                            Garanta seu ingresso antes que esgote.
                        </div>

                    </div>
                </div>

                <div class="accordion-item">
                    <h2 class="accordion-header">
                        <button class="accordion-button collapsed" 
                                type="button"
                                data-bs-toggle="collapse"
                                data-bs-target="#collapseTwo">
                            Regras do Evento
                        </button>
                    </h2>

                    <div id="collapseTwo" 
                         class="accordion-collapse collapse"
                         data-bs-parent="#accordionInfo">

                        <div class="accordion-body">
                            Obrigatória apresentação de documento com foto.
                            Meia entrada exige comprovante válido.
                        </div>

                    </div>
                </div>

            </div>

            <form>

                <!-- Form Floating -->
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="nome" placeholder="Digite seu nome">
                    <label for="nome">Nome Completo</label>
                </div>

                <!-- Form Floating -->
                <div class="form-floating mb-3">
                    <input type="email" class="form-control" id="email" placeholder="Digite seu e-mail">
                    <label for="email">E-mail</label>
                </div>

                <!-- Input Group -->
                <div class="input-group mb-3">
                    <span class="input-group-text">R$</span>
                    <input type="number" class="form-control" placeholder="Valor do ingresso">
                </div>

                <!-- Quantidade -->
                <div class="form-floating mb-3">
                    <input type="number" class="form-control" id="quantidade" placeholder="Quantidade">
                    <label for="quantidade">Quantidade de Ingressos</label>
                </div>

                <!-- Tipo de ingresso -->
                <div class="mb-3">
                    <label class="form-label">
                        Tipo de Ingresso
                        <span class="badge bg-primary">Novo</span>
                    </label>

                    <select class="form-select">
                        <option selected>Selecione</option>
                        <option>Inteira</option>
                        <option>Meia Entrada</option>
                        <option>VIP</option>
                    </select>
                </div>

                <!-- Botão -->
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">
                        Comprar Ingresso
                    </button>
                </div>

            </form>

        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
